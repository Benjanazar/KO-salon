<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitios web</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background: #0a0a0a;
    font-family: system-ui, sans-serif;
    flex-wrap: wrap;
    padding: 40px 20px;
  }
  a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 40px 48px;
    text-decoration: none;
    color: #fff;
    transition: transform .2s, border-color .2s;
  }
  a:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.25); }
  .label { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: .06em; text-transform: uppercase; }
  .name { font-size: 22px; font-weight: 600; }
</style>
</head>
<body>
  <a href="ko-salon.html">
    <span class="label">Salón de belleza</span>
    <span class="name">KO Salon</span>
  </a>
  <a href="web-jg-cars.html">
    <span class="label">Concesionaria</span>
    <span class="name">J&amp;G Cars</span>
  </a>
  <a href="ww-app.html">
    <span class="label">Medicina integrativa</span>
    <span class="name">We Wellness Club</span>
  </a>
  <a href="asesor-financiero.html">
    <span class="label">Asesor de inversiones</span>
    <span class="name">Martín Solano</span>
  </a>
</body>
</html>
